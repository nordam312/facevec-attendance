# =============================================================================
# FaceVec Attendance — local orchestration of the full distributed system.
#
#   cp .env.example .env   &&   docker compose up --build
#
# Service start order is gated by health checks (depends_on: service_healthy)
# so the stateful infrastructure (Postgres, Redis, RabbitMQ) is ready before
# the application services connect.
# =============================================================================
name: facevec-attendance

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 17 + pgvector — primary store and HNSW vector index host.
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: facevec-postgres
    <<: *default-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Deterministic, locale-stable collation for reproducible indexes.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [facevec-net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Redis — session/refresh tokens, idempotency keys, WebSocket connection map.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: facevec-redis
    <<: *default-restart
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [facevec-net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # RabbitMQ — broker for CPU-bound async face-processing tasks.
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: facevec-rabbitmq
    <<: *default-restart
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"          # AMQP
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks: [facevec-net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # API Ingestion Gateway — Express + TypeScript (strict).
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    image: facevec/gateway:dev
    container_name: facevec-gateway
    <<: *default-restart
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      AI_INFERENCE_URL: http://ai-inference:8000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1209600}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [facevec-net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # AI Inference Microservice — FastAPI + InsightFace (model added in Phase 4).
  # ---------------------------------------------------------------------------
  ai-inference:
    build:
      context: ./services/ai-inference
      dockerfile: Dockerfile
    image: facevec/ai-inference:dev
    container_name: facevec-ai-inference
    <<: *default-restart
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.75}
    ports:
      - "${AI_INFERENCE_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [facevec-net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Admin / Professor Dashboard — Next.js 15 (standalone output).
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    image: facevec/web:dev
    container_name: facevec-web
    <<: *default-restart
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      gateway:
        condition: service_started
    networks: [facevec-net]
    logging: *default-logging

networks:
  facevec-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
