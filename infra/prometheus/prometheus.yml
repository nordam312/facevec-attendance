# Prometheus scrape configuration for the FaceVec services.
# Used by the `observability` compose profile.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: ai-inference
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-inference:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
